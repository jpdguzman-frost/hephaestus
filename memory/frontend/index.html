<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rex Memory</title>
  <script>
    var b = document.createElement('base');
    var p = location.pathname.replace(/\/+$/, '');
    var root = p.replace(/\/frontend(\/.*)?$/, '');
    b.href = root + '/';
    document.head.appendChild(b);
  </script>
  <link rel="stylesheet" href="frontend/css/app.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="logo">Rex Memory</h1>
        <nav class="nav">
          <a href="#" class="nav-link active" data-view="overview">Overview</a>
          <a href="#" class="nav-link" data-view="browse">Browse</a>
          <a href="#" class="nav-link" data-view="cleanup">Cleanup</a>
        </nav>
      </div>
      <div class="topbar-right">
        <span class="status" id="status">connecting...</span>
      </div>
    </header>

    <main class="content">
      <!-- Overview -->
      <section id="view-overview" class="view">
        <div class="stats-grid" id="stats-grid"></div>
        <h2>Recent Memories</h2>
        <div id="recent-list" class="memory-list"></div>
      </section>

      <!-- Browse -->
      <section id="view-browse" class="view hidden">
        <div class="filters">
          <select id="filter-scope">
            <option value="">All scopes</option>
            <option value="team">Team</option>
            <option value="file">File</option>
            <option value="page">Page</option>
            <option value="user">User</option>
          </select>
          <select id="filter-category">
            <option value="">All categories</option>
            <option value="decision">Decision</option>
            <option value="convention">Convention</option>
            <option value="context">Context</option>
            <option value="rejection">Rejection</option>
            <option value="relationship">Relationship</option>
            <option value="preference">Preference</option>
            <option value="correction">Correction</option>
          </select>
          <label class="checkbox-label">
            <input type="checkbox" id="filter-superseded"> Show superseded
          </label>
          <button class="btn" id="btn-refresh">Refresh</button>
        </div>
        <div id="browse-list" class="memory-list"></div>
      </section>

      <!-- Cleanup -->
      <section id="view-cleanup" class="view hidden">
        <div class="cleanup-form">
          <div class="form-row">
            <label>Max age (days, 0 access):</label>
            <input type="number" id="cleanup-age" value="30" min="1">
          </div>
          <div class="form-row">
            <label>Min confidence:</label>
            <input type="number" id="cleanup-conf" value="0.2" min="0" max="1" step="0.1">
          </div>
          <label class="checkbox-label">
            <input type="checkbox" id="cleanup-superseded" checked> Remove superseded
          </label>
          <div class="cleanup-actions">
            <button class="btn" id="btn-preview">Preview</button>
            <button class="btn btn-danger" id="btn-execute" disabled>Execute Cleanup</button>
          </div>
        </div>
        <div id="cleanup-result" class="cleanup-result"></div>
      </section>

      <!-- Detail Modal -->
      <div id="modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
          <div class="modal-header">
            <h3 id="modal-title">Memory Detail</h3>
            <button class="modal-close" id="modal-close">&times;</button>
          </div>
          <div id="modal-body"></div>
          <div class="modal-footer">
            <button class="btn btn-danger" id="btn-delete">Delete</button>
            <button class="btn" id="btn-save">Save</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="frontend/js/app.js"></script>
</body>
</html>
