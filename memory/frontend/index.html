<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rex Memory</title>
  <script>
    var b = document.createElement('base');
    var p = location.pathname.replace(/\/+$/, '');
    var root = p.replace(/\/frontend(\/.*)?$/, '');
    b.href = root + '/';
    document.head.appendChild(b);
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="frontend/css/app.css">
</head>
<body>
  <div class="shell">
    <!-- Grain overlay -->
    <div class="grain" aria-hidden="true"></div>

    <header class="topbar">
      <div class="topbar-left">
        <h1 class="logo">
          <span class="logo-icon">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="1" y="1" width="16" height="16" rx="4" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="6.5" cy="7" r="1.5" fill="currentColor"/>
              <circle cx="11.5" cy="7" r="1.5" fill="currentColor"/>
              <path d="M5.5 11.5C6.5 13 11.5 13 12.5 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
          Rex Memory
        </h1>
        <nav class="nav">
          <a href="#" class="nav-link" data-view="overview">Overview</a>
          <a href="#" class="nav-link active" data-view="browse">Browse</a>
          <a href="#" class="nav-link" data-view="cleanup">Cleanup</a>
          <a href="#" class="nav-link" data-view="chat">Chat History</a>
        </nav>
      </div>
      <div class="topbar-right">
        <span class="status" id="status">
          <span class="status-dot"></span>
          connecting...
        </span>
      </div>
    </header>

    <main class="content">
      <!-- Overview -->
      <section id="view-overview" class="view hidden">
        <div class="overview-inner">
          <div class="stats-grid" id="stats-grid"></div>
          <div class="section-header">
            <h2>Recent Memories</h2>
            <span class="section-count" id="recent-count"></span>
          </div>
          <div id="recent-list" class="memory-list"></div>
        </div>
      </section>

      <!-- Browse -->
      <section id="view-browse" class="view browse-layout">
        <aside class="browse-sidebar">
          <div class="sidebar-filters">
            <div class="filter-row">
              <select id="filter-file">
              <option value="">All files</option>
            </select>
              <select id="filter-category">
                <option value="">All categories</option>
                <option value="context">Context</option>
                <option value="decision">Decision</option>
                <option value="convention">Convention</option>
                <option value="rejection">Rejection</option>
                <option value="relationship">Relationship</option>
                <option value="preference">Preference</option>
                <option value="correction">Correction</option>
              </select>
            </div>
            <label class="checkbox-label">
              <input type="checkbox" id="filter-superseded">
              <span class="checkbox-custom"></span>
              Superseded
            </label>
          </div>
          <div class="sidebar-list" id="sidebar-list"></div>
        </aside>
        <div class="browse-detail" id="browse-detail">
          <div class="detail-empty">
            <div class="detail-empty-icon">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <rect x="4" y="4" width="40" height="40" rx="10" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
                <path d="M16 20h16M16 28h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
              </svg>
            </div>
            <p>Select a memory to view</p>
          </div>
        </div>
      </section>

      <!-- Cleanup -->
      <section id="view-cleanup" class="view hidden">
        <div class="cleanup-inner">
          <div class="section-header" style="margin-bottom:20px">
            <h2>Cleanup</h2>
          </div>
          <div class="cleanup-form">
            <div class="form-row">
              <label>Max age (days, 0 access)</label>
              <input type="number" id="cleanup-age" value="30" min="1">
            </div>
            <div class="form-row">
              <label>Min confidence</label>
              <input type="number" id="cleanup-conf" value="0.2" min="0" max="1" step="0.1">
            </div>
            <label class="checkbox-label">
              <input type="checkbox" id="cleanup-superseded" checked>
              <span class="checkbox-custom"></span>
              Remove superseded
            </label>
            <div class="cleanup-actions">
              <button class="btn" id="btn-preview">Preview</button>
              <button class="btn btn-danger" id="btn-execute" disabled>Execute Cleanup</button>
            </div>
          </div>
          <div id="cleanup-result" class="cleanup-result"></div>
        </div>
      </section>
      <!-- Chat History -->
      <section id="view-chat" class="view hidden chat-layout">
        <aside class="chat-sidebar">
          <div class="sidebar-filters">
            <div class="filter-row">
              <select id="chat-filter-file">
                <option value="">All files</option>
              </select>
            </div>
          </div>
          <div class="chat-session-list" id="chat-session-list"></div>
        </aside>
        <div class="chat-detail" id="chat-detail">
          <div class="detail-empty">
            <div class="detail-empty-icon">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <path d="M8 12a6 6 0 0 1 6-6h20a6 6 0 0 1 6 6v16a6 6 0 0 1-6 6H18l-8 6V12z" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
                <path d="M16 18h16M16 24h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
              </svg>
            </div>
            <p>Select a conversation to view</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="frontend/js/app.js"></script>
</body>
</html>
