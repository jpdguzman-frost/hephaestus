# Rex Memory Service — Apache Reverse Proxy
# Add this inside the aux.frostdesigngroup.com VirtualHost block

# Reverse proxy /rex → localhost:3940/rex
ProxyPreserveHost On
ProxyPass /rex http://localhost:3940/rex
ProxyPassReverse /rex http://localhost:3940/rex

# Live URL:      https://aux.frostdesigngroup.com/rex
# Dashboard:     https://aux.frostdesigngroup.com/rex/frontend/
# Health check:  https://aux.frostdesigngroup.com/rex/api/health
