<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0D0D0D;
    color: #A0A0A0;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", Menlo, Consolas, monospace;
    font-size: 10px;
    line-height: 1.3;
    overflow: hidden;
    user-select: none;
  }

  #container {
    padding: 10px 12px 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    height: 100%;
  }

  /* ─── ASCII Art Header ─── */
  #ascii-header {
    white-space: pre;
    font-size: 8px;
    line-height: 1.15;
    letter-spacing: 0.5px;
    text-align: center;
    color: #F97316;
    transition: opacity 0.4s;
    min-height: 62px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #ascii-header.idle {
    color: #555;
  }

  #ascii-header.connected {
    color: #22C55E;
  }

  /* ─── Separator ─── */
  #separator {
    height: 1px;
    background: linear-gradient(to right, transparent, #333, transparent);
  }

  /* ─── Status Bar ─── */
  #status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    min-height: 16px;
  }

  #dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
    transition: background 0.3s;
  }

  #dot.pulse {
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #label {
    flex: 1;
    transition: opacity 0.2s;
    color: #777;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #transport-badge {
    font-size: 8px;
    padding: 1px 4px;
    border-radius: 3px;
    background: #1A1A1A;
    color: #555;
    flex-shrink: 0;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  #transport-badge.ws { color: #22C55E; border: 1px solid #1A3A1A; }
  #transport-badge.http { color: #F59E0B; border: 1px solid #3A2A0A; }
  #transport-badge.off { color: #555; border: 1px solid #222; }

  /* ─── Forging Glow ─── */
  .forging #ascii-header {
    color: #F97316;
    text-shadow: 0 0 8px rgba(249,115,22,0.3);
    animation: forgeGlow 2s ease-in-out infinite;
  }

  @keyframes forgeGlow {
    0%, 100% { text-shadow: 0 0 8px rgba(249,115,22,0.2); }
    50% { text-shadow: 0 0 16px rgba(249,115,22,0.5), 0 0 4px rgba(251,191,36,0.3); }
  }

  .forging #label { color: #F97316; }
  .forging #separator { background: linear-gradient(to right, transparent, #F97316, transparent); }

  /* ─── Chat Mode ─── */
  #chat-container {
    display: none;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  #chat-container.active {
    display: flex;
  }

  #status-container.hidden {
    display: none;
  }

  /* Chat header */
  #chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
  }

  #chat-header-title {
    font-size: 11px;
    color: #F97316;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  #chat-back-btn {
    background: none;
    border: 1px solid #333;
    color: #777;
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
  }
  #chat-back-btn:hover {
    border-color: #555;
    color: #aaa;
  }

  /* Chat messages area */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #chat-messages::-webkit-scrollbar {
    width: 4px;
  }
  #chat-messages::-webkit-scrollbar-track {
    background: transparent;
  }
  #chat-messages::-webkit-scrollbar-thumb {
    background: #333;
    border-radius: 2px;
  }

  .chat-msg {
    max-width: 85%;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 11px;
    line-height: 1.4;
    word-wrap: break-word;
  }

  .chat-msg.user {
    align-self: flex-end;
    background: #1A2A1A;
    color: #A0D0A0;
    border-bottom-right-radius: 2px;
  }

  .chat-msg.assistant {
    align-self: flex-start;
    background: #1A1A2A;
    color: #A0A0D0;
    border-bottom-left-radius: 2px;
  }

  .chat-msg.system {
    align-self: center;
    background: transparent;
    color: #555;
    font-size: 9px;
    font-style: italic;
  }

  .chat-msg .selection-tag {
    display: inline-block;
    background: #2A2A1A;
    color: #D0D0A0;
    font-size: 8px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-top: 3px;
  }

  /* Typing indicator */
  .typing-indicator {
    display: none;
    align-self: flex-start;
    padding: 6px 10px;
    color: #555;
    font-size: 10px;
    font-style: italic;
  }

  .typing-indicator.visible {
    display: block;
  }

  /* Chat input */
  #chat-input-area {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    border-top: 1px solid #222;
    flex-shrink: 0;
  }

  #chat-input {
    flex: 1;
    background: #1A1A1A;
    border: 1px solid #333;
    color: #ccc;
    font-family: inherit;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 6px;
    outline: none;
    resize: none;
    min-height: 32px;
    max-height: 80px;
  }

  #chat-input:focus {
    border-color: #F97316;
  }

  #chat-input::placeholder {
    color: #444;
  }

  #chat-send-btn {
    background: #F97316;
    border: none;
    color: #0D0D0D;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    align-self: flex-end;
  }

  #chat-send-btn:hover {
    background: #FB923C;
  }

  #chat-send-btn:disabled {
    background: #333;
    color: #555;
    cursor: default;
  }

  /* Mode toggle button on status view */
  #mode-toggle {
    position: absolute;
    top: 8px;
    right: 12px;
    background: none;
    border: 1px solid #333;
    color: #555;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    z-index: 10;
  }
  #mode-toggle:hover {
    border-color: #F97316;
    color: #F97316;
  }

  /* ─── Markdown in Chat ─── */
  .chat-msg code.md-inline-code {
    background: #2A2A2A;
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 10px;
    color: #E0E0E0;
  }

  .chat-msg pre.md-code-block {
    background: #1A1A1A;
    border: 1px solid #2A2A2A;
    border-radius: 4px;
    padding: 6px 8px;
    margin: 4px 0;
    overflow-x: auto;
    font-size: 10px;
    line-height: 1.4;
    color: #D0D0D0;
  }

  .chat-msg pre.md-code-block code {
    background: none;
    padding: 0;
    font-size: inherit;
    color: inherit;
  }

  .chat-msg strong {
    color: #E0E0E0;
    font-weight: 600;
  }

  .chat-msg em {
    font-style: italic;
    color: #B0B0D0;
  }

  .chat-msg .md-bullet {
    display: block;
    padding-left: 8px;
  }

  /* ─── Error Messages ─── */
  .chat-msg.error {
    align-self: flex-start;
    background: #2A1A1A;
    color: #D0A0A0;
    border-bottom-left-radius: 2px;
    border-left: 2px solid #EF4444;
  }
</style>

<div id="container" style="position: relative;">
  <button id="mode-toggle">CHAT</button>

  <div id="status-container">
    <div id="ascii-header" class="idle"></div>
    <div id="separator"></div>
    <div id="status-bar">
      <span id="dot"></span>
      <span id="label">Connecting...</span>
      <span id="transport-badge" class="off">---</span>
    </div>
  </div>

  <div id="chat-container">
    <div id="chat-header">
      <span id="chat-header-title">HEPHAESTUS CHAT</span>
      <button id="chat-back-btn">STATUS</button>
    </div>
    <div id="chat-messages">
      <div class="chat-msg system">Send a message to Claude Code CLI</div>
    </div>
    <div class="typing-indicator" id="typing-indicator">Claude is thinking...</div>
    <div id="chat-input-area">
      <textarea id="chat-input" placeholder="Message Claude..." rows="1"></textarea>
      <button id="chat-send-btn">Send</button>
    </div>
  </div>
</div>

<script>
  var dot = document.getElementById("dot");
  var label = document.getElementById("label");
  var header = document.getElementById("ascii-header");
  var badge = document.getElementById("transport-badge");
  var container = document.getElementById("container");

  var colors = {
    connected: "#22C55E",
    polling: "#F59E0B",
    disconnected: "#EF4444",
    forging: "#F97316"
  };

  // ─── ASCII Art Frames ──────────────────────────────────────────────────

  // Idle: rotating logo frames with subtle variations
  var idleFrames = [
    [
      " _  _ ___ ___ _  _   _   ___ ___ _____ _   _ ___",
      "| || | __| _ | || | /_\\ | __/ __|_   _| | | / __|",
      "| __ | _||  _| __ |/ _ \\| _|\\__ \\ | | | |_| \\__ \\",
      "|_||_|___|_| |_||_/_/ \\_|_| |___/ |_|  \\___/|___/",
      "                                                  "
    ],
    [
      " _  _ ___ ___ _  _   _   ___ ___ _____ _   _ ___",
      "| || | __| _ | || | /_\\ | __/ __|_   _| | | / __|",
      "| __ | _||  _| __ |/ _ \\| _|\\__ \\ | | | |_| \\__ \\",
      "|_||_|___|_| |_||_/_/ \\_|_| |___/ |_|  \\___/|___/",
      "             ~ god of the forge ~                 "
    ],
    [
      " _  _ ___ ___ _  _   _   ___ ___ _____ _   _ ___",
      "| || | __| _ | || | /_\\ | __/ __|_   _| | | / __|",
      "| __ | _||  _| __ |/ _ \\| _|\\__ \\ | | | |_| \\__ \\",
      "|_||_|___|_| |_||_/_/ \\_|_| |___/ |_|  \\___/|___/",
      "            ~ figma x claude ~                    "
    ],
    [
      " _  _ ___ ___ _  _   _   ___ ___ _____ _   _ ___",
      "| || | __| _ | || | /_\\ | __/ __|_   _| | | / __|",
      "| __ | _||  _| __ |/ _ \\| _|\\__ \\ | | | |_| \\__ \\",
      "|_||_|___|_| |_||_/_/ \\_|_| |___/ |_|  \\___/|___/",
      "                                                  "
    ]
  ];

  // Forging: hammer striking anvil, sparks flying
  var forgingFrames = [
    [
      "     ,/|                 ",
      "   ,/ /    . *     .    *",
      " ,/  /       __|__      .",
      "/ __/       |     |      ",
      "|/   \\______|_____|      ",
      "      \\  /               ",
      "   ~~~~\\/~~~~            "
    ],
    [
      "      \\      *     .     ",
      "       \\                .",
      "     ___\\      __|__     ",
      "    /    \\    |     |    ",
      "   |  *   \\__|_____|    ",
      "    \\______/    .    *   ",
      "   ~~~~\\/~~~~            "
    ],
    [
      "              .   *   .  ",
      "      __|    *       *  .",
      "     /  |      __|__    *",
      "    /   |     |  ** |    ",
      "   | .* |____|_____|    ",
      "    \\___/   . * . *  .  ",
      "   ~~~/\\~~~~             "
    ],
    [
      "     _/      *   .    *  ",
      "    / /   .          .   ",
      "   / /        __|__      ",
      "  / /        |     |     ",
      " |/    ______|_____|     ",
      "      /    * .  * .   *  ",
      "   ~~~~\\/~~~~            "
    ],
    [
      "      |\\   .    *     .  ",
      "      | \\       .   *   ",
      "      | _\\     __|__    *",
      "      |/   \\  |  ** |    ",
      "   *   \\____|_|_____|    ",
      "   .  * \\_/  . * .  * . ",
      "   ~~~~\\/~~~~            "
    ],
    [
      "           .  *  .   *   ",
      "       __     *    .   * ",
      "     _/  \\     __|__   . ",
      "    |  ** \\   | *** |    ",
      "     \\____\\__|_____|    ",
      "     * . * .  * .  * .  ",
      "   ~~~/\\~~~~             "
    ]
  ];

  var currentFrame = 0;
  var animTimer = null;
  var isForging = false;
  var currentTransport = null;

  function startIdleAnimation() {
    stopAnimation();
    currentFrame = 0;
    renderFrame(idleFrames[0]);
    animTimer = setInterval(function() {
      currentFrame = (currentFrame + 1) % idleFrames.length;
      renderFrame(idleFrames[currentFrame]);
    }, 3000);
  }

  function startForgingAnimation() {
    stopAnimation();
    currentFrame = 0;
    renderFrame(forgingFrames[0]);
    animTimer = setInterval(function() {
      currentFrame = (currentFrame + 1) % forgingFrames.length;
      renderFrame(forgingFrames[currentFrame]);
    }, 350);
  }

  function stopAnimation() {
    if (animTimer) {
      clearInterval(animTimer);
      animTimer = null;
    }
  }

  function renderFrame(lines) {
    header.textContent = lines.join("\n");
  }

  // ─── Forging Phrases ────────────────────────────────────────────────────
  var forgingPhrases = [
    "Heating the anvil...",
    "Stoking the flames...",
    "Hammering pixels...",
    "Bending vectors...",
    "Quenching the steel...",
    "Sparks flying...",
    "Tempering frames...",
    "Folding layers...",
    "Shaping the alloy...",
    "Casting components...",
    "Welding nodes...",
    "Smelting gradients...",
    "Grinding edges...",
    "Firing up the crucible...",
    "Pouring molten layout...",
    "Forging in progress...",
    "Anvil ringing...",
    "Drawing the blade...",
    "Embossing details...",
    "Etching fine lines...",
    "Reforging variants...",
    "Kindling the hearth...",
    "Striking while hot...",
    "Tongs gripping tight...",
    "Bellows pumping...",
    "White-hot creation...",
    "Twisting filigree...",
    "Hammering harmony...",
    "Fusing elements...",
    "Annealing perfection...",
    "Burnishing surfaces...",
    "Chiseling contours...",
    "Riveting together...",
    "Soldering connections...",
    "Plating with gold...",
    "Inlaying patterns...",
    "Wrought with care...",
    "Smithing shadows...",
    "Forging fire & form...",
    "Tempering typography...",
    "Beating into shape...",
    "The forge glows...",
    "Metal meeting mallet...",
    "Crafting relentlessly...",
    "Hephaestus at work...",
    "Olympian effort...",
    "Mythic precision...",
    "Divine craftsmanship...",
    "Volcanic intensity...",
    "Masterwork forming..."
  ];

  var phraseInterval = null;
  var forgingStartTime = 0;
  var forgingHideTimer = null;
  var MIN_FORGING_DISPLAY = 1500; // Minimum ms to show forging animation
  var activeForgeCount = 0; // Track nested/parallel forging signals

  function showForging() {
    activeForgeCount++;
    if (isForging) return; // Already showing
    isForging = true;
    forgingStartTime = Date.now();
    container.classList.add("forging");
    header.classList.remove("idle", "connected");

    dot.style.background = colors.forging;
    dot.classList.add("pulse");

    // Cancel any pending hide
    if (forgingHideTimer) {
      clearTimeout(forgingHideTimer);
      forgingHideTimer = null;
    }

    startForgingAnimation();
    cyclePhrase();
    phraseInterval = setInterval(cyclePhrase, 2000);
  }

  function hideForging() {
    activeForgeCount = Math.max(0, activeForgeCount - 1);
    if (activeForgeCount > 0) return; // Other tools still active

    // Ensure minimum display time so animation is visible
    var elapsed = Date.now() - forgingStartTime;
    var remaining = MIN_FORGING_DISPLAY - elapsed;

    if (remaining > 0) {
      // Delay the hide so animation plays for at least MIN_FORGING_DISPLAY
      if (!forgingHideTimer) {
        forgingHideTimer = setTimeout(function() {
          forgingHideTimer = null;
          doHideForging();
        }, remaining);
      }
      return;
    }

    doHideForging();
  }

  function doHideForging() {
    if (!isForging) return;
    isForging = false;
    activeForgeCount = 0;
    container.classList.remove("forging");
    dot.classList.remove("pulse");

    if (phraseInterval) {
      clearInterval(phraseInterval);
      phraseInterval = null;
    }

    showIdle();
  }

  function cyclePhrase() {
    var idx = Math.floor(Math.random() * forgingPhrases.length);
    label.textContent = forgingPhrases[idx];
  }

  function showIdle() {
    if (currentTransport === "websocket") {
      dot.style.background = colors.connected;
      header.classList.remove("idle");
      header.classList.add("connected");
      label.textContent = "Awaiting instructions...";
      badge.textContent = "WS";
      badge.className = "ws";
    } else if (currentTransport === "http") {
      dot.style.background = colors.polling;
      header.classList.remove("idle", "connected");
      label.textContent = "Awaiting instructions...";
      badge.textContent = "HTTP";
      badge.className = "http";
    } else {
      dot.style.background = colors.disconnected;
      header.classList.add("idle");
      header.classList.remove("connected");
      label.textContent = "Disconnected";
      badge.textContent = "---";
      badge.className = "off";
    }
    startIdleAnimation();
  }

  // Start with idle animation
  startIdleAnimation();

  // ─── Networking Bridge ──────────────────────────────────────────────────

  var activeWs = null;

  window.onmessage = function(event) {
    var msg = event.data.pluginMessage;
    if (!msg) return;

    switch (msg.type) {
      case "status":
        updateStatus(msg);
        break;
      case "forging-start":
        showForging();
        break;
      case "forging-stop":
        hideForging();
        break;
      case "http-request":
        handleHttpRequest(msg);
        break;
      case "ws-connect":
        handleWsConnect(msg);
        break;
      case "ws-send":
        handleWsSend(msg);
        break;
      case "ws-disconnect":
        handleWsDisconnect();
        break;
      case "chat-response":
        receiveChatResponse(msg);
        break;
      case "chat-sent-confirmation":
        handleSentConfirmation(msg);
        break;
      case "chat-chunk":
        handleChatChunk(msg);
        break;
    }
  };

  function updateStatus(msg) {
    if (msg.connected) {
      currentTransport = msg.transport;
    } else {
      currentTransport = null;
    }
    if (!isForging) {
      showIdle();
    }
  }

  function handleHttpRequest(msg) {
    var xhr = new XMLHttpRequest();
    xhr.open(msg.method, msg.url, true);
    xhr.timeout = msg.timeout || 10000;

    if (msg.headers) {
      for (var key in msg.headers) {
        xhr.setRequestHeader(key, msg.headers[key]);
      }
    }

    xhr.onload = function() {
      parent.postMessage({
        pluginMessage: {
          type: "http-response",
          requestId: msg.requestId,
          status: xhr.status,
          body: xhr.responseText
        }
      }, "*");
    };

    xhr.onerror = function() {
      parent.postMessage({
        pluginMessage: {
          type: "http-response",
          requestId: msg.requestId,
          status: 0,
          body: null,
          error: "Network error"
        }
      }, "*");
    };

    xhr.ontimeout = function() {
      parent.postMessage({
        pluginMessage: {
          type: "http-response",
          requestId: msg.requestId,
          status: 0,
          body: null,
          error: "Timeout"
        }
      }, "*");
    };

    if (msg.body) {
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.send(msg.body);
    } else {
      xhr.send();
    }
  }

  function handleWsConnect(msg) {
    if (activeWs) {
      try { activeWs.close(); } catch(e) {}
    }

    try {
      activeWs = new WebSocket(msg.url);

      activeWs.onopen = function() {
        parent.postMessage({
          pluginMessage: { type: "ws-open" }
        }, "*");
      };

      activeWs.onmessage = function(event) {
        parent.postMessage({
          pluginMessage: { type: "ws-message", data: event.data }
        }, "*");
      };

      activeWs.onclose = function(event) {
        activeWs = null;
        parent.postMessage({
          pluginMessage: { type: "ws-close", code: event.code, reason: event.reason }
        }, "*");
      };

      activeWs.onerror = function() {
        parent.postMessage({
          pluginMessage: { type: "ws-error" }
        }, "*");
      };
    } catch(e) {
      parent.postMessage({
        pluginMessage: { type: "ws-error", error: e.message }
      }, "*");
    }
  }

  function handleWsSend(msg) {
    if (activeWs && activeWs.readyState === WebSocket.OPEN) {
      activeWs.send(msg.data);
    }
  }

  function handleWsDisconnect() {
    if (activeWs) {
      try { activeWs.close(1000, "plugin_closing"); } catch(e) {}
      activeWs = null;
    }
  }

  // ─── Chat Mode ───────────────────────────────────────────────────────────
  var statusContainer = document.getElementById("status-container");
  var chatContainer = document.getElementById("chat-container");
  var modeToggle = document.getElementById("mode-toggle");
  var chatBackBtn = document.getElementById("chat-back-btn");
  var chatInput = document.getElementById("chat-input");
  var chatSendBtn = document.getElementById("chat-send-btn");
  var chatMessages = document.getElementById("chat-messages");
  var typingIndicator = document.getElementById("typing-indicator");
  var isChatMode = false;
  var chatMsgCounter = 0;

  function switchToChat() {
    isChatMode = true;
    statusContainer.classList.add("hidden");
    chatContainer.classList.add("active");
    modeToggle.style.display = "none";
    chatInput.focus();
    // Request larger window for chat
    parent.postMessage({ pluginMessage: { type: "resize", width: 340, height: 400 } }, "*");
  }

  function switchToStatus() {
    isChatMode = false;
    chatContainer.classList.remove("active");
    statusContainer.classList.remove("hidden");
    modeToggle.style.display = "block";
    // Restore smaller window
    parent.postMessage({ pluginMessage: { type: "resize", width: 340, height: 150 } }, "*");
  }

  modeToggle.addEventListener("click", switchToChat);
  chatBackBtn.addEventListener("click", switchToStatus);

  // Auto-resize textarea
  chatInput.addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 80) + "px";
  });

  // Send on Enter (Shift+Enter for newline)
  chatInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendChatMessage();
    }
  });

  chatSendBtn.addEventListener("click", sendChatMessage);

  function sendChatMessage() {
    var text = chatInput.value.trim();
    if (!text) return;

    chatMsgCounter++;
    var msgId = "chat_" + chatMsgCounter + "_" + Date.now();

    // Add user message to chat
    appendChatMessage("user", text);

    // Clear input
    chatInput.value = "";
    chatInput.style.height = "auto";

    // Show typing indicator
    typingIndicator.classList.add("visible");

    // Send to plugin main thread (which sends to relay)
    parent.postMessage({
      pluginMessage: {
        type: "chat-send",
        id: msgId,
        message: text
      }
    }, "*");
  }

  function renderMarkdown(text) {
    // Escape HTML first
    var escaped = text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");

    // Code blocks (```)
    escaped = escaped.replace(/```(\w*)\n?([\s\S]*?)```/g, function(match, lang, code) {
      return '<pre class="md-code-block"><code>' + code.trim() + '</code></pre>';
    });

    // Inline code (`)
    escaped = escaped.replace(/`([^`]+)`/g, '<code class="md-inline-code">$1</code>');

    // Bold (**text**)
    escaped = escaped.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    // Italic (*text*)
    escaped = escaped.replace(/\*([^*]+)\*/g, '<em>$1</em>');

    // Bullet lists (lines starting with - or *)
    escaped = escaped.replace(/^[\-\*] (.+)$/gm, '<span class="md-bullet">&bull; $1</span>');

    // Numbered lists
    escaped = escaped.replace(/^\d+\. (.+)$/gm, function(match, content) {
      return '<span class="md-bullet">' + match.charAt(0) + '. ' + content + '</span>';
    });

    // Line breaks
    escaped = escaped.replace(/\n/g, '<br>');

    return escaped;
  }

  function appendChatMessage(role, text, selectionInfo) {
    var div = document.createElement("div");
    div.className = "chat-msg " + role;

    if (role === "assistant" || role === "error") {
      div.innerHTML = renderMarkdown(text);
    } else {
      div.textContent = text;
    }

    if (selectionInfo && selectionInfo.length > 0) {
      var tag = document.createElement("div");
      tag.className = "selection-tag";
      tag.textContent = selectionInfo.length + " node" + (selectionInfo.length > 1 ? "s" : "") + " selected";
      div.appendChild(tag);
    }

    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  var seenResponseIds = {};
  function receiveChatResponse(data) {
    // Dedup: responses can arrive via both WS and HTTP polling
    if (data.id && seenResponseIds[data.id]) return;
    if (data.id) seenResponseIds[data.id] = true;
    typingIndicator.classList.remove("visible");
    if (data.isError) {
      appendChatMessage("error", data.message);
    } else {
      appendChatMessage("assistant", data.message);
    }
  }

  function handleSentConfirmation(data) {
    if (data.selectionCount > 0) {
      // Find the last user message and add a selection tag
      var userMsgs = chatMessages.querySelectorAll(".chat-msg.user");
      var lastUserMsg = userMsgs[userMsgs.length - 1];
      if (lastUserMsg) {
        var tag = document.createElement("div");
        tag.className = "selection-tag";
        var summary = data.selectionSummary.join(", ");
        if (data.selectionCount > 3) {
          summary += " +" + (data.selectionCount - 3) + " more";
        }
        tag.textContent = "\u2B21 " + summary;
        lastUserMsg.appendChild(tag);
      }
    }
  }

  var streamingMessages = {};

  function handleChatChunk(data) {
    if (data.id && seenResponseIds[data.id]) return;

    typingIndicator.classList.remove("visible");

    if (!streamingMessages[data.id]) {
      // First chunk — create a new message div
      var div = document.createElement("div");
      div.className = "chat-msg assistant";
      div.setAttribute("data-stream-id", data.id);
      chatMessages.appendChild(div);
      streamingMessages[data.id] = { div: div, text: "" };
    }

    var stream = streamingMessages[data.id];
    stream.text += data.delta;
    stream.div.innerHTML = renderMarkdown(stream.text);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    if (data.done) {
      seenResponseIds[data.id] = true;
      delete streamingMessages[data.id];
    }
  }
</script>
